services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: context-os-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: context_os
      POSTGRES_PASSWORD: context_os_dev
      POSTGRES_DB: context_os_dev
    ports:
      - "5432:5432"
    volumes:
      - context_os_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U context_os -d context_os_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  context_os_postgres_data:
