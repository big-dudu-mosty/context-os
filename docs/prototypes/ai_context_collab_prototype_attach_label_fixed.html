<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Native Context Collaboration Tool · P0 Prototype</title>
  <style>
:root {
  --bg: #f6f4ef;
  --surface: #fffdf8;
  --surface-2: #f2efe8;
  --surface-3: #eae5da;
  --text: #20201d;
  --text-soft: #5d5b55;
  --muted: #88847a;
  --line: #ded7c9;
  --line-strong: #cfc5b3;
  --brand: #7c4dff;
  --brand-2: #5b35d5;
  --green: #178c57;
  --orange: #b76613;
  --red: #c0392b;
  --blue: #2767c7;
  --shadow: 0 20px 50px rgba(48, 39, 22, 0.12);
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { box-sizing: border-box; }

html,
body,
#app {
  height: 100%;
}

body {
  margin: 0;
  background: radial-gradient(circle at top left, #fff8e9 0, #f6f4ef 34%, #efebe3 100%);
  color: var(--text);
  font-family: var(--sans);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100%;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  border-bottom: 1px solid rgba(222, 215, 201, 0.75);
  background: rgba(255, 253, 248, 0.82);
  backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 20;
}

.brand {
  display: flex;
  cursor: pointer;
  align-items: center;
  gap: 12px;
  min-width: 330px;
}

.logo-mark {
  width: 38px;
  height: 38px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  background: linear-gradient(135deg, #8b5cf6, #ffb86b);
  color: white;
  box-shadow: 0 8px 25px rgba(124, 77, 255, 0.24);
  font-weight: 800;
}

.brand-title {
  font-weight: 760;
  letter-spacing: -0.02em;
}

.brand-subtitle {
  color: var(--muted);
  font-size: 12px;
  margin-top: 2px;
}

.top-center {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.workspace-pill,
.role-pill,
.repo-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 1px solid var(--line);
  background: #fffaf1;
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text-soft);
  white-space: nowrap;
}

.workspace-pill strong,
.role-pill strong,
.repo-pill strong {
  color: var(--text);
}

.role-select {
  border: none;
  background: transparent;
  color: var(--text);
  font-weight: 680;
  outline: none;
  max-width: 135px;
}

.top-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn {
  border: 1px solid var(--line);
  background: var(--surface);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  font-weight: 660;
  font-size: 13px;
  transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
  box-shadow: 0 1px 0 rgba(255,255,255,0.7) inset;
}

.btn:hover {
  transform: translateY(-1px);
  border-color: var(--line-strong);
  box-shadow: 0 10px 24px rgba(48, 39, 22, 0.08);
}

.btn.primary {
  border-color: #6d4de5;
  background: linear-gradient(135deg, var(--brand), var(--brand-2));
  color: white;
  box-shadow: 0 13px 30px rgba(124, 77, 255, 0.22);
}

.btn.ghost {
  background: transparent;
  box-shadow: none;
}

.btn.soft {
  background: var(--surface-2);
}

.btn.danger {
  border-color: rgba(192, 57, 43, .25);
  color: var(--red);
}

.btn.success {
  border-color: rgba(23, 140, 87, .25);
  color: var(--green);
}

.btn.small {
  padding: 6px 9px;
  font-size: 12px;
}

.btn.block {
  width: 100%;
}

.nav-tabs {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 11px 22px;
  border-bottom: 1px solid rgba(222, 215, 201, 0.75);
  background: rgba(246, 244, 239, 0.9);
  overflow-x: auto;
}

.nav-tab {
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-soft);
  border-radius: 999px;
  padding: 8px 12px;
  font-weight: 650;
  font-size: 13px;
  white-space: nowrap;
}

.nav-tab.active {
  background: var(--surface);
  color: var(--text);
  border-color: var(--line);
  box-shadow: 0 7px 16px rgba(48, 39, 22, 0.06);
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  border-radius: 999px;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 760;
  background: var(--surface-2);
  color: var(--text-soft);
  border: 1px solid var(--line);
  white-space: nowrap;
}

.badge.green { color: var(--green); background: rgba(23, 140, 87, .08); border-color: rgba(23, 140, 87, .18); }
.badge.orange { color: var(--orange); background: rgba(183, 102, 19, .09); border-color: rgba(183, 102, 19, .20); }
.badge.red { color: var(--red); background: rgba(192, 57, 43, .08); border-color: rgba(192, 57, 43, .20); }
.badge.blue { color: var(--blue); background: rgba(39, 103, 199, .08); border-color: rgba(39, 103, 199, .18); }
.badge.purple { color: var(--brand-2); background: rgba(124, 77, 255, .08); border-color: rgba(124, 77, 255, .18); }

.main-stage {
  min-height: 0;
  overflow: hidden;
}

.workbench {
  height: calc(100vh - 68px);
  display: grid;
  grid-template-columns: 300px minmax(520px, 1fr);
  gap: 12px;
  padding: 12px;
  position: relative;
}

.workbench.right-active.left-hidden {
  grid-template-columns: minmax(360px, 0.42fr) minmax(560px, 0.58fr);
}

.workbench.right-active.left-visible {
  grid-template-columns: 280px minmax(320px, 0.35fr) minmax(520px, 0.65fr);
}

.workbench.right-active .center-panel {
  min-width: 0;
}

.workbench.no-right .right-panel {
  display: none;
}

.sidebar-reopen {
  position: absolute;
  left: 18px;
  top: 18px;
  z-index: 15;
  width: 34px;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(255, 253, 248, 0.96);
  color: var(--text-soft);
  display: grid;
  place-items: center;
  box-shadow: 0 8px 18px rgba(48, 39, 22, 0.08);
}

.sidebar-reopen:hover {
  color: var(--text);
  border-color: var(--line-strong);
  background: #fffdf8;
}

.panel {
  background: rgba(255, 253, 248, 0.9);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  min-height: 0;
  overflow: hidden;
  box-shadow: 0 1px 0 rgba(255,255,255,.8) inset;
}

.left-panel,
.right-panel,
.center-panel {
  display: flex;
  flex-direction: column;
}

.panel-header {
  padding: 14px 14px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px solid rgba(222, 215, 201, 0.7);
}

.panel-title {
  font-weight: 760;
  letter-spacing: -0.01em;
}

.panel-subtitle {
  color: var(--muted);
  font-size: 12px;
  margin-top: 3px;
}

.panel-body {
  padding: 12px;
  overflow: auto;
  min-height: 0;
}

.section-title {
  margin: 10px 2px 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.session-card,
.context-row,
.item-card,
.handoff-card,
.artifact-card,
.github-file,
.review-card {
  border: 1px solid var(--line);
  background: rgba(255,255,255,.52);
  border-radius: var(--radius-md);
  padding: 12px;
  margin-bottom: 9px;
  transition: border-color .16s ease, transform .16s ease, box-shadow .16s ease, background .16s ease;
}

.session-card:hover,
.context-row:hover,
.item-card:hover,
.handoff-card:hover,
.artifact-card:hover,
.github-file:hover,
.review-card:hover {
  border-color: var(--line-strong);
  transform: translateY(-1px);
  box-shadow: 0 12px 22px rgba(48, 39, 22, 0.06);
}

.session-card.active,
.context-row.active,
.github-file.active {
  border-color: rgba(124, 77, 255, .36);
  background: rgba(124, 77, 255, .06);
}

.card-topline {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.card-title {
  font-weight: 760;
  line-height: 1.25;
  font-size: 14px;
}

.card-meta {
  color: var(--muted);
  font-size: 12px;
  margin-top: 5px;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.card-desc {
  color: var(--text-soft);
  font-size: 13px;
  line-height: 1.55;
  margin-top: 8px;
}

.context-tree {
  margin-top: 6px;
}

.tree-group {
  margin-bottom: 8px;
}

.tree-parent {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-soft);
  font-weight: 720;
  padding: 7px 8px;
  border-radius: 10px;
}

.tree-child {
  margin-left: 14px;
  border-left: 1px dashed var(--line-strong);
  padding-left: 10px;
}

.context-row {
  padding: 9px 10px;
  border-radius: 13px;
}

.context-row-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 13px;
}

.nav-list {
  display: grid;
  gap: 2px;
}

.nav-row {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 6px;
  min-height: 34px;
  padding: 7px 8px;
  border-radius: 10px;
  color: var(--text-soft);
}

.nav-row.session-row,
.nav-row.context-row {
  border: 0;
  background: transparent;
  margin-bottom: 0;
  box-shadow: none;
}

.nav-row.context-row:hover,
.nav-row.session-row:hover {
  transform: none;
  box-shadow: none;
  border-color: transparent;
}

.nav-row.context-row.active,
.nav-row.session-row.active {
  border-color: transparent;
  background: rgba(124, 77, 255, .075);
}

.nav-row:hover,
.nav-row.active {
  background: rgba(124, 77, 255, .075);
  color: var(--text);
}

.nav-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  font-weight: 620;
  cursor: pointer;
}

.nav-status {
  font-size: 11px;
  color: var(--muted);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 7px;
  background: rgba(255,255,255,.55);
}

.row-menu {
  position: relative;
}

.row-menu > summary {
  list-style: none;
  width: 24px;
  height: 24px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  color: var(--muted);
  cursor: pointer;
}

.row-menu > summary::-webkit-details-marker { display: none; }
.row-menu[open] > summary,
.row-menu > summary:hover { background: var(--surface-2); color: var(--text); }

.menu-popover {
  position: absolute;
  right: 0;
  top: 28px;
  width: 180px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 6px;
  box-shadow: var(--shadow);
  z-index: 30;
}

.menu-popover button {
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--text-soft);
  text-align: left;
  border-radius: 9px;
  padding: 8px 9px;
  font-size: 12px;
}

.menu-popover button:hover {
  background: var(--surface-2);
  color: var(--text);
}



/* GPT-style left navigator: flat text directory, no cards */
.left-panel {
  background: rgba(255, 253, 248, 0.78);
  border: 0;
  border-right: 1px solid rgba(222, 215, 201, 0.72);
  border-radius: 0;
  box-shadow: none;
}

.left-panel .panel-header {
  padding: 16px 14px 8px;
  border-bottom: 0;
}

.left-panel .panel-title {
  font-size: 16px;
  font-weight: 760;
}

.left-panel .panel-subtitle {
  display: none;
}

.left-panel .panel-body {
  padding: 4px 8px 18px;
}

.left-panel .section-title {
  margin: 18px 8px 8px;
  color: var(--text);
  font-size: 13px;
  font-weight: 780;
  letter-spacing: 0;
  text-transform: none;
  justify-content: flex-start;
  gap: 8px;
}

.left-panel .section-title span {
  margin-left: auto;
  color: var(--muted);
  font-size: 12px;
  font-weight: 650;
  letter-spacing: 0;
  text-transform: none;
}

.left-panel .nav-list,
.left-panel .context-tree,
.left-panel .tree-group,
.left-panel .tree-child {
  display: grid;
  gap: 2px;
}

.left-panel .context-tree {
  margin-top: 0;
}

.left-panel .tree-group {
  margin-bottom: 8px;
}

.left-panel .tree-parent {
  color: var(--text);
  font-size: 13px;
  font-weight: 720;
  padding: 7px 8px;
  border-radius: 9px;
}

.left-panel .tree-child {
  margin-left: 10px;
  padding-left: 8px;
  border-left: 1px solid rgba(222, 215, 201, 0.9);
}

.left-panel .nav-row,
.left-panel .session-card,
.left-panel .context-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 6px;
  min-height: 34px;
  padding: 7px 8px;
  margin: 0 0 1px;
  border: 0 !important;
  border-radius: 9px !important;
  background: transparent !important;
  box-shadow: none !important;
  transform: none !important;
}

.left-panel .nav-row:hover,
.left-panel .session-card:hover,
.left-panel .context-row:hover,
.left-panel .nav-row.active,
.left-panel .session-card.active,
.left-panel .context-row.active {
  background: rgba(32, 32, 29, 0.055) !important;
  border: 0 !important;
  box-shadow: none !important;
  transform: none !important;
}

.left-panel .nav-title,
.left-panel .card-title,
.left-panel .context-row-title {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
  font-size: 14px;
  font-weight: 520;
  line-height: 1.2;
}

.left-panel .nav-status,
.left-panel .badge {
  padding: 0;
  border: 0;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 560;
}

.left-panel .row-menu > summary {
  width: 26px;
  height: 26px;
  border-radius: 8px;
  opacity: 0;
}

.left-panel .nav-row:hover .row-menu > summary,
.left-panel .row-menu[open] > summary {
  opacity: 1;
}

.left-panel .session-card .card-meta,
.left-panel .session-card .card-desc,
.left-panel .context-row .card-meta,
.left-panel .context-row .card-desc {
  display: none !important;
}

.left-panel .session-card .card-topline {
  display: contents;
}

.center-header.compact .session-controls {
  grid-template-columns: repeat(2, minmax(120px, 1fr));
}

.center-header.compact .session-name {
  font-size: 16px;
}

.center-panel.compact .composer-toolbar .btn {
  padding-left: 8px;
  padding-right: 8px;
}

.center-header {
  padding: 15px 16px 12px;
  border-bottom: 1px solid rgba(222, 215, 201, 0.7);
  display: grid;
  gap: 10px;
}

.session-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.session-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  background: #ebe3ff;
  color: var(--brand-2);
  font-weight: 850;
  flex: 0 0 auto;
}

.avatar.ceo { background: #ffe8cc; color: #b45902; }
.avatar.pm { background: #e8e0ff; color: #5b35d5; }
.avatar.engineer { background: #dff0ff; color: #2767c7; }
.avatar.ops { background: #dff7e9; color: #178c57; }

.session-name {
  font-size: 18px;
  font-weight: 820;
  letter-spacing: -0.03em;
  line-height: 1.15;
}

.session-meta {
  color: var(--muted);
  font-size: 12px;
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.session-controls {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 8px;
}

.control-field {
  border: 1px solid var(--line);
  background: rgba(255,255,255,.65);
  border-radius: 14px;
  padding: 8px 10px;
}

.control-field label {
  display: block;
  color: var(--muted);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.control-field select,
.control-field input {
  width: 100%;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  font-weight: 680;
}

.message-thread {
  flex: 1;
  overflow: auto;
  padding: 18px 16px 12px;
  background: linear-gradient(180deg, rgba(255,253,248,.88), rgba(246,244,239,.76));
}

.message {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 10px;
  margin-bottom: 16px;
  animation: fadeUp .2s ease both;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(4px);} to { opacity:1; transform: translateY(0);} }

.message-bubble {
  border: 1px solid var(--line);
  background: rgba(255,255,255,.72);
  border-radius: 18px;
  padding: 12px 13px;
  line-height: 1.6;
  font-size: 14px;
  box-shadow: 0 1px 0 rgba(255,255,255,.7) inset;
}

.message-bubble.ai {
  background: #fffaf1;
}

.message-author {
  font-weight: 790;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.message-body ul,
.markdownish ul {
  margin: 7px 0 0 18px;
  padding: 0;
}

.message-body li,
.markdownish li {
  margin: 5px 0;
}

.context-strip {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.context-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line);
  background: rgba(242, 239, 232, .78);
  border-radius: 999px;
  padding: 5px 8px;
  color: var(--text-soft);
  font-size: 12px;
}

.composer {
  border-top: 1px solid rgba(222, 215, 201, 0.7);
  padding: 11px 12px 12px;
  background: rgba(255,253,248,.86);
}

.composer-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 7px;
  margin-bottom: 9px;
}

.composer-input-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

.composer textarea {
  resize: none;
  min-height: 60px;
  max-height: 120px;
  border: 1px solid var(--line);
  border-radius: 17px;
  background: #fffdfa;
  color: var(--text);
  padding: 12px 13px;
  outline: none;
  line-height: 1.5;
}

.composer textarea:focus {
  border-color: rgba(124, 77, 255, .4);
  box-shadow: 0 0 0 4px rgba(124, 77, 255, .08);
}

.right-panel .panel-body {
  padding: 0;
}

.right-content {
  padding: 12px;
  overflow: auto;
  min-height: 0;
}

.right-panel {
  min-width: 0;
}

.right-editor {
  display: grid;
  gap: 10px;
}

.right-editor textarea {
  min-height: 118px;
}

.right-editor textarea.tall {
  min-height: 270px;
  font-family: var(--mono);
  line-height: 1.5;
}

.right-kicker {
  color: var(--muted);
  font-size: 11px;
  font-weight: 820;
  letter-spacing: .07em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.right-empty {
  padding: 18px;
}

.context-list-mode .used-item {
  cursor: pointer;
}

.context-list-mode .used-item.active {
  border-color: rgba(124, 77, 255, .38);

.page {

}

.page-header {
  max-width: 1240px;
  margin: 0 auto 14px;

  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}

.page-eyebrow {
  color: var(--muted);

}

.page-title {

}

.page-desc {
  color: var(--text-soft);

  margin-top: 8px;

}

.grid-2 {

}

.grid-3 {
  max-width: 1240px;

  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.stack {
  display: grid;
  gap: 10px;
}

.page-card {
  background: rgba(255, 253, 248, 0.9);

.page-card h3 {

}

.package-detail {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 13px;
  background: #fffdfa;
  margin-top: 10px;
}

.kv-grid {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 8px 10px;
  font-size: 13px;
  margin-top: 10px;

.kv-grid .key {
  color: var(--muted);
  font-weight: 760;
}

.markdownish {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-soft);
}

.markdownish strong {
  color: var(--text);
}

.status-flow {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.flow-step {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.flow-dot {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: var(--surface-3);
  border: 1px solid var(--line-strong);
}

.flow-step.done .flow-dot { background: var(--green); border-color: var(--green); }
.flow-step.active .flow-dot { background: var(--brand); border-color: var(--brand); }

.review-card.approved { border-color: rgba(23, 140, 87, .28); background: rgba(23, 140, 87, .045); }
.review-card.rejected { opacity: .58; }

.onboarding-steps {
  display: grid;
  gap: 10px;
}

.step-row {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: center;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.58);
  border-radius: 16px;
  padding: 12px;
}

.step-number {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  background: var(--surface-2);
  font-weight: 850;
  color: var(--text-soft);
}

.step-row.done .step-number {
  background: rgba(23, 140, 87, .12);
  color: var(--green);
}

.github-layout {
  max-width: 1240px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 330px 1fr;
  gap: 14px;
}

.file-tree-list {
  display: grid;
  gap: 8px;
}

.code-preview {
  background: #1f1f1e;
  color: #f7f0dd;
  border-radius: 18px;
  padding: 14px;
  overflow: auto;
  min-height: 460px;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  white-space: pre;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(30, 27, 21, .42);
  backdrop-filter: blur(6px);
  z-index: 60;
  display: grid;
  place-items: center;
  padding: 24px;
}

.modal {
  width: min(760px, 100%);
  max-height: 88vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
}

.modal.wide {
  width: min(1020px, 100%);
}

.modal-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.modal-title {
  font-size: 19px;
  font-weight: 850;
  letter-spacing: -0.02em;
}

.modal-body {
  padding: 16px 18px;
  overflow: auto;
}

.modal-footer {
  padding: 12px 18px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.form-grid-2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.source-list {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}

.source-row {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px;
  background: rgba(255,255,255,.58);
}

.toast-root {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 100;
  display: grid;
  gap: 8px;
}

.toast {
  background: #24231f;
  color: white;
  border-radius: 16px;
  padding: 11px 13px;
  min-width: 270px;
  max-width: 420px;
  box-shadow: 0 18px 40px rgba(0,0,0,.18);
  animation: slideIn .2s ease both;
}

.toast small {
  display: block;
  color: rgba(255,255,255,.7);
  margin-top: 3px;
}

@keyframes slideIn { from { transform: translateY(8px); opacity:0;} to { transform: translateY(0); opacity:1;} }

.empty-state {
  border: 1px dashed var(--line-strong);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

.split-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 10px;
}

.progress-meter {
  height: 9px;
  border-radius: 999px;
  background: var(--surface-3);
  overflow: hidden;
  border: 1px solid var(--line);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brand), #ffb86b);
}

@media (max-width: 1180px) {
  .workbench,
  .workbench.right-active { grid-template-columns: 1fr; }
  .session-controls { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
  .grid-2,
  .github-layout { grid-template-columns: 1fr; }
}

@media (max-width: 820px) {

  .workbench { height: auto; min-height: calc(100vh - 68px); grid-template-columns: 1fr; }
  .left-panel { max-height: 420px; }

function member(id) { return data.members[id]; }
function agent(id) { return data.agents[id]; }
function project(id) { return data.projects[id]; }
function session(id) { return data.sessions[id]; }
function contextItem(id) { return data.contextItems[id]; }
function artifact(id) { return data.artifacts[id]; }
function handoff(id) { return data.handoffs[id]; }
function githubFile(id) { return data.githubFiles[id]; }

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function richText(value) {
  return escapeHtml(value)
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>')
    .replace(/^- (.*)$/gm, '• $1');
}

function typeLabel(type) {
  const labels = {
    vision_mission: 'Vision', product_positioning: 'Positioning', user_persona: 'Persona', user_feedback: 'Feedback',
    github_code_context: 'GitHub', artifact: 'Artifact', experiment_result: 'Experiment', decision: 'Decision',
    task_status: 'Task', prd: 'PRD', tech_architecture: 'Tech', coding_convention: 'Convention', meeting_note: 'Meeting',
    competitor_research: 'Research', ai_session_summary: 'AI Summary', task_brief: 'Task Brief', engineering_brief: 'Engineering',
    experiment_report: 'Experiment Report', github_file: 'GitHub File', handoff: 'Handoff'
  };
  return labels[type] || type;
}

function badgeClass(typeOrStatus) {
  const value = String(typeOrStatus || '').toLowerCase();
  if (['approved', 'completed', 'used', 'received', 'green'].includes(value)) return 'green';
  if (['active', 'prd', 'blue', 'github_file', 'github_code_context'].includes(value)) return 'blue';
  if (['pending', 'sent', 'draft', 'open_question', 'orange'].includes(value)) return 'orange';
  if (['risk', 'rejected', 'blocked', 'red'].includes(value)) return 'red';
  return 'purple';
}

function statusLabel(status) {
  const labels = {
    active: 'active', completed: 'completed', archived: 'archived',
    draft: 'draft', pending_confirmation: 'pending confirmation', sent: 'sent', received: 'received', used: 'used to start session',
    pending: 'pending review', approved: 'approved', rejected: 'rejected'
  };
  return labels[status] || status;
}

}

function renderAiMessageActions(msg) {

function renderSourcePill(id) {
  const resolved = resolveRefById(id);
  return `<span class="context-pill">${resolved.icon} ${escapeHtml(resolved.title)}</span>`;
}

function resolveTypedRef(ref) {
  if (ref.type === 'context') {
    const item = contextItem(ref.id);
    const sourceOwner = item.source?.ownerId ? member(item.source.ownerId).name : 'Company Context';
    return { icon: contextTypeIcon(item.type), title: item.title, type: item.type, typeLabel: typeLabel(item.type), source: sourceOwner };
  }
  if (ref.type === 'artifact') {
    const item = artifact(ref.id);
    return { icon: '📄', title: item.title, type: item.type, typeLabel: typeLabel(item.type), source: session(item.sessionId)?.title || 'Artifact' };
  }
  if (ref.type === 'handoff') {
    const item = handoff(ref.id);
    return { icon: '↗', title: item.title, type: 'handoff', typeLabel: 'Handoff', source: `${member(item.fromOwnerId).name} → ${member(item.toOwnerId).name}` };
  }
  if (ref.type === 'github') {
    const item = githubFile(ref.id);
    return { icon: '⌘', title: item.path, type: 'github_file', typeLabel: 'GitHub File', source: 'read-only repo' };
  }
  return { icon: '✦', title: ref.id, type: ref.type, typeLabel: ref.type, source: 'unknown' };
}

function resolveRefById(id) {
  if (data.contextItems[id]) return { icon: contextTypeIcon(data.contextItems[id].type), title: data.contextItems[id].title };
  if (data.artifacts[id]) return { icon: '📄', title: data.artifacts[id].title };
  if (data.handoffs[id]) return { icon: '↗', title: data.handoffs[id].title };
  if (data.githubFiles[id]) return { icon: '⌘', title: data.githubFiles[id].path };
  return { icon: '✦', title: id };
}

function hasRightPanelContent() {
  const s = currentSession();
  if (!state.rightPanelVisible) return false;
  const mode = getRightMode();
  if (mode === 'artifact') return s.artifactIds.length > 0 || !!state.selectedRightArtifactId;
  if (mode === 'handoff') return !!state.draftHandoff || s.handoffIds.length > 0 || !!state.selectedRightHandoffId;
  if (mode === 'context') return ['context', 'dialogue', 'thinking'].includes(state.rightReason) || s.usedItems.length > 0;
  return false;
}

function getRightMode() {
  const mode = state.rightMode || state.rightActiveTab || 'context';
  if (['context', 'artifact', 'handoff'].includes(mode)) return mode;
  return 'context';
}

function rightPanelMeta() {
  const mode = getRightMode();
  if (mode === 'artifact') {
    return {
      title: 'Artifact Editor',
      subtitle: 'AI 生成 artifact 后，右栏直接展示当前 artifact，可继续编辑或让 AI 修改。'
    };
  }
  if (mode === 'handoff') {
    return {
      title: 'Handoff Package',
      subtitle: 'Create Handoff 后，右栏替换为可编辑的交接包内容。'
    };
  }
  if (state.rightReason === 'thinking') {
    return {
      title: 'Context in Use',
      subtitle: 'AI 正在基于当前 session 与 attached context 思考。'
    };
  }
  return {
    title: 'Context in Use',
    subtitle: '仅在 attach context、发起对话或 AI 思考时展示当前使用的 context。'
  };

function activateRight(mode, reason = mode) {
  state.rightPanelVisible = true;
  state.rightMode = mode;
  state.rightActiveTab = mode;
  state.rightReason = reason;
  state.leftPanelOpen = false;
}

function closeRightPanel() {
  state.rightPanelVisible = false;
  state.rightMode = null;
  state.rightReason = null;
  state.selectedRightContextId = null;
  state.selectedRightArtifactId = null;
  state.selectedRightHandoffId = null;
  state.leftPanelOpen = true;
  render();
}

function closeLeftPanel() {
  state.leftPanelOpen = false;
  render();
}

function openLeftPanel() {
  state.leftPanelOpen = true;
  render();
}

function collapseLeftPanel() {
  state.leftPanelOpen = false;
  render();
}

function renderRightPanel() {
  const mode = getRightMode();
  if (mode === 'artifact') {
    return `
      <aside class="panel right-panel artifact-panel">
        <div class="panel-body right-content artifact-right-content">
          ${renderRightActiveContent()}
        </div>
      </aside>
    `;
  }
  const meta = rightPanelMeta();
  return `
    <aside class="panel right-panel">
      <div class="panel-header compact-right-header">
        <div>
          <div class="panel-title">${meta.title}</div>
          <div class="panel-subtitle">${meta.subtitle}</div>
        </div>
        <button class="btn small ghost" onclick="closeRightPanel()" title="Close">✕</button>
      </div>
      <div class="panel-body right-content">
        ${renderRightActiveContent()}
      </div>
    </aside>
  `;
}

function setRightMode(mode, reason = mode) {
  activateRight(mode, reason);
  render();
}

function setRightTab(tab) {
  // Kept as a compatibility wrapper for older inline handlers.
  setRightMode(tab, tab);
}

function renderRightActiveContent() {
  const mode = getRightMode();
  if (mode === 'artifact') return renderArtifactEditorPanel();
  if (mode === 'handoff') return renderHandoffPanel();
  return renderContextPanel();
}

function renderContextPanel() {
  const s = currentSession();
  if (!s.usedItems.length) {
    return `<div class="right-list-empty">当前对话暂未 attach 外部 context。AI 只会基于本 session 的消息继续工作。</div>`;
  }
  return `
    <div class="right-list-panel">
      <div class="right-list-title">Context in use</div>
      <div class="right-list-note">AI 当前读取过的内容，只做透明展示；产出文件会直接切到 Artifact。</div>
      <div class="right-list">
        ${s.usedItems.map(ref => {
          const item = resolveTypedRef(ref);
          return `
            <button class="right-list-row" onclick="selectRightContext('${ref.id}')" title="${escapeHtml(item.title)}">
              <span class="right-list-icon">${item.icon}</span>
              <span class="right-list-main">
                <span class="right-list-row-title">${escapeHtml(item.title)}</span>
                <span class="right-list-row-meta">${item.typeLabel} · ${escapeHtml(item.source)} · ${ref.usedAt}</span>
              </span>
            </button>

        }).join('')}
      </div>
    </div>
  `;
}

function selectRightContext(id) {
  state.selectedRightContextId = id;
  render();
}

function renderSelectedContextDetail() {
  const s = currentSession();
  const ref = s.usedItems.find(x => x.id === state.selectedRightContextId) || s.usedItems[0];
  if (!ref) return '';
  if (ref.type === 'context') return renderContextInlineEditor(ref.id);
  if (ref.type === 'artifact') return renderArtifactInlineReadOnly(ref.id);
  if (ref.type === 'handoff') return renderHandoffInlineSummary(ref.id);
  if (ref.type === 'github') return renderGithubInlineSummary(ref.id);
  return '';
}

  return `
    <div class="package-detail">
      <div class="right-kicker">Context Detail</div>
      <div class="form-field"><label>Title</label><input id="ctx-edit-title" value="${escapeHtml(item.title)}" /></div>

  const modal = state.modal;
  if (modal.type === 'newSession') return renderNewSessionModal();
  if (modal.type === 'contextDetail') return renderContextDetailModal(modal.id);
  if (modal.type === 'artifactDetail') return renderArtifactModal(modal.id);
  if (modal.type === 'attach') return renderAttachModal();
  if (modal.type === 'contextReview') return renderContextReviewModal(modal.payload || {});
  if (modal.type === 'dreamEdit') return renderDreamEditModal(modal.id);
  return '';
}

  data.sessions[id] = {
    id, title, projectId, ownerId, agentId, model,
    status: 'active', updatedAt: '刚刚', usedItems: [], artifactIds: [], handoffIds: [],
    messages: [{ id: `m_${Date.now()}`, role: 'ai', agentId, body: `已创建 ${title}。你可以从左栏 attach company context、previous session、handoff package、artifact 或 GitHub file。` }]
  };
  if (contextId) data.sessions[id].usedItems.push({ type: 'context', id: contextId, usedAt: '刚刚' });
  state.currentSessionId = id;
  if (contextId) {
    state.rightPanelVisible = true;
    state.rightMode = 'context';
    state.rightActiveTab = 'context';
    state.rightReason = 'context';
    state.selectedRightContextId = contextId;
  } else {
    state.rightPanelVisible = false;
    state.rightReason = null;
  }
  state.view = 'workbench';
  state.modal = null;
  toast('New Session created', title);

function addUsedRef(ref) {
  const s = currentSession();
  const exists = s.usedItems.some(item => item.type === ref.type && item.id === ref.id);
  if (!exists) s.usedItems.push(ref);
}

function openTypedRef(type, id) {
  if (type === 'context') showContextDetail(id);
  else if (type === 'artifact') showArtifact(id);
  else if (type === 'handoff') openHandoffDetail(id);
  else if (type === 'github') {
    state.selectedRightContextId = id;
    activateRight('context', 'context');
    render();
  }
}

function showContextDetail(id) {
  const s = currentSession();
  if (!s.usedItems.some(ref => ref.type === 'context' && ref.id === id)) {
    addUsedRef({ type: 'context', id, usedAt: '查看中' });
  }
  state.selectedRightContextId = id;
  activateRight('context', 'context');
  render();
}

function showArtifact(id) {
  state.selectedRightArtifactId = id;
  activateRight('artifact', 'artifact');
  render();
}

function openHandoffDetail(id) {
  state.selectedHandoffId = id;

  state.modal = null;
  render();
}


function saveMessageAsContext(messageId) {
  const s = currentSession();
  const msg = s.messages.find(m => m.id === messageId);
  if (!msg) return;
  const ag = agent(msg.agentId || s.agentId);
  state.modal = {
    type: 'contextReview',
    payload: {
      title: `${ag.name} Output：${s.title}`,
      type: ag.role === 'engineering' ? 'tech_architecture' : ag.role === 'product' ? 'prd' : ag.role === 'research' ? 'user_feedback' : 'ai_session_summary',
      summary: stripHtml(richText(msg.body)).slice(0, 160) || 'AI 返回内容，可确认后保存为 Company Context。',
      content: msg.body
    }
  };
  render();
}

function retryAiMessage(messageId) {
  const s = currentSession();
  const idx = s.messages.findIndex(m => m.id === messageId);
  if (idx < 0) return;
  const priorUser = [...s.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
  const prompt = priorUser?.body || '请基于当前上下文重新组织答案。';
  const response = simulateAiResponse(s, prompt);
  s.messages[idx] = {
    ...s.messages[idx],
    body: `${response.body}\n\n（已根据当前 attached context 重新生成。）`,
    sourceRefs: response.sourceRefs
  };
  s.updatedAt = '刚刚';
  activateRight('context', 'dialogue');
  toast('已重试这条 AI 回复');
  render();
}

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function sendMessage() {
  const input = document.getElementById('composer-input');
  const text = input.value.trim();
  if (!text) {
    toast('请输入一条消息');
    return;
  }
  const s = currentSession();
  s.messages.push({ id: `m_${Date.now()}_u`, role: 'user', authorId: s.ownerId, body: text });
  activateRight('context', 'dialogue');
  const response = simulateAiResponse(s, text);
  s.messages.push({ id: `m_${Date.now()}_ai`, role: 'ai', agentId: s.agentId, body: response.body, sourceRefs: response.sourceRefs });
  s.updatedAt = '刚刚';
  render();
}

function simulateAiResponse(s, text) {
  const refs = s.usedItems.slice(-3).map(item => item.id);
  const ag = agent(s.agentId);
  if (ag.role === 'strategy') {
    return { body: '基于当前上下文，我建议把这个想法收束成一个可交接的战略 brief：目标用户、核心痛点、P0 成功标准、风险和下游 PM 的下一步。右栏已经列出我读取过的 source references。', sourceRefs: refs };
  }
  if (ag.role === 'product') {
    return { body: '我会把输入拆成 PRD 结构：用户故事、范围边界、验收标准、artifact、handoff 字段和 demo script。建议先确认 Company Context 中的产品定位，再生成 Engineering Handoff。', sourceRefs: refs };
  }
  if (ag.role === 'engineering') {
    return { body: '我会基于 PRD、handoff package 和 GitHub files 生成实现计划。P0 建议前端先使用 mock data 与状态流，确保 handoff、artifact 和 dream review 可演示。', sourceRefs: refs };
  }
  return { body: '我会整理用户反馈、实验数据和可入库 context update，并把高置信度结论放入 Dream Review Queue。', sourceRefs: refs };
}

function generateArtifact() {
  const s = currentSession();
  const ag = agent(s.agentId);
  let type = 'task_brief';
  let title = 'Task Brief：Session Output Draft';
  let summary = 'AI 根据当前 session 和 attached context 生成的结构化输出。';
  let content = '# Task Brief\n\n- Goal：承接当前 session 的主要任务。\n- Context：来自右栏 Currently Used Context。\n- Output：可保存为 company context 或加入 handoff package。';
  if (ag.role === 'product') {
    type = 'prd';
    title = `PRD Draft：${project(s.projectId).name}`;
    summary = '包含用户故事、功能范围、验收标准和工程交接范围。';
    content = '# PRD Draft\n\n## User Story\n作为团队成员，我希望基于上游 handoff package 开启新 session。\n\n## Scope\n三栏式工作台、Company Context、Artifact、Handoff Inbox、Dream Review。\n\n## Acceptance Criteria\n下游成员无需阅读完整原始 session，也能继续工作。';
  } else if (ag.role === 'engineering') {
    type = 'engineering_brief';
    title = 'Engineering Brief：Prototype Implementation Plan';
    summary = '将 PRD 映射为前端组件、mock data 和状态流。';
    content = '# Engineering Brief\n\n## Components\n- App Shell\n- Navigator\n- Work Session\n- Context & Output Panel\n- Inbox / Dream / GitHub pages\n\n## Data\nSession、ContextItem、HandoffPackage、Artifact、DreamSuggestion。';
  } else if (ag.role === 'research') {
    type = 'experiment_report';
    title = 'Research Brief：Context Handoff Pain Points';
    summary = '整理用户反馈和可验证假设。';
    content = '# Research Brief\n\n## Insight\nAI 工作上下文散落在个人工具中，导致交接成本高。\n\n## Hypothesis\n结构化 handoff package 能显著降低下游重新询问背景的次数。';
  }
  const id = `art_${Date.now()}`;
  data.artifacts[id] = { id, title, type, sessionId: s.id, createdBy: s.ownerId, updatedAt: '刚刚', summary, content };
  s.artifactIds.push(id);
  state.selectedRightArtifactId = id;
  activateRight('artifact', 'artifact');
  s.messages.push({ id: `m_${Date.now()}_artifact`, role: 'ai', agentId: s.agentId, body: `已生成 artifact：${title}。你可以在右栏直接编辑、保存为 company context，或加入 handoff package。`, sourceRefs: [id] });
  toast('Artifact generated', title);
  render();
}

function confirmContextSave() {
  const title = document.getElementById('context-title').value.trim();

  const projectId = document.getElementById('context-project').value;
  const summary = document.getElementById('context-summary').value.trim();
  const content = document.getElementById('context-content').value.trim();
  const id = `ctx_${Date.now()}`;
  data.contextItems[id] = {
    id, title, type, projectId, summary, content,
    category: categoryFromType(type),
    source: { ownerId: currentSession().ownerId, sessionId: currentSession().id, artifactId: currentSession().artifactIds.at(-1) },
    version: 1,
    updatedAt: '刚刚',
    status: 'approved'
  };
  addUsedRef({ type: 'context', id, usedAt: '刚刚' });
  state.selectedRightContextId = id;
  activateRight('context', 'context');
  state.modal = null;
  toast('已保存到 Company Context', title);
  render();
}

function categoryFromType(type) {
  if (type === 'prd') return 'PRD';
  if (type === 'decision') return 'Decisions';
  if (type === 'experiment_result') return 'Experiment Results';
  if (['tech_architecture', 'github_code_context', 'coding_convention'].includes(type)) return 'Engineering Notes';
  if (['user_feedback', 'user_persona'].includes(type)) return 'User Feedback';
  if (type === 'vision_mission' || type === 'product_positioning') return 'Vision & Mission';
  return 'AI Session Summaries';
}

function createHandoffDraft() {
  const s = currentSession();
  const defaultTo = s.ownerId === 'ceo' ? 'pm' : s.ownerId === 'pm' ? 'engineer' : 'pm';
  const attachedContext = s.usedItems.filter(item => item.type === 'context').map(item => item.id);
  const lastArtifactId = s.artifactIds.length ? s.artifactIds.at(-1) : null;
  const fileTitle = lastArtifactId ? artifact(lastArtifactId).title : '当前 session 输出';
  state.draftHandoff = {
    title: `${member(s.ownerId).shortRole} → ${member(defaultTo).shortRole}：${fileTitle}`,
    toOwnerId: defaultTo,
    message: `我把「${fileTitle}」发你，核心内容都在文件里。你可以基于它继续推进下一步，需要背景时再看 source session。`,
    taskGoal: `基于「${fileTitle}」继续推进下一步。`,
    backgroundContext: `来自 ${s.title}。`,
    currentStatus: '待下游 owner 接收。',
    keyDecisions: [],
    constraints: [],
    openQuestions: [],
    risks: [],
    suggestedNextSteps: [],
    relatedContextIds: attachedContext,
    relatedArtifactIds: lastArtifactId ? [lastArtifactId] : []
  };
  activateRight('handoff', 'handoff');
  toast('Handoff draft created', '在右栏发送文件和简短留言');
  render();
}

function sendDraftHandoff() {
  const s = currentSession();
  const d = state.draftHandoff;
  if (!d) return;
  const id = `handoff_${Date.now()}`;
  const toOwnerId = document.getElementById('draft-to').value;
  const msg = document.getElementById('draft-message').value.trim() || d.message || d.taskGoal;
  data.handoffs[id] = {
    id,
    title: document.getElementById('draft-title').value.trim() || d.title,
    fromOwnerId: s.ownerId,
    toOwnerId,
    projectId: s.projectId,
    sourceSessionId: s.id,
    relatedContextIds: d.relatedContextIds,
    relatedArtifactIds: d.relatedArtifactIds,
    message: msg,
    taskGoal: msg,
    backgroundContext: d.backgroundContext,
    currentStatus: d.currentStatus,
    keyDecisions: [],
    constraints: [],
    openQuestions: [],
    risks: [],
    suggestedNextSteps: [],
    status: 'sent',
    createdAt: '刚刚'
  };
  s.handoffIds.push(id);
  s.messages.push({ id: `m_${Date.now()}_handoff`, role: 'ai', agentId: s.agentId, body: `已发送给 ${member(toOwnerId).name}：${msg}`, sourceRefs: [id] });
  state.draftHandoff = null;
  state.selectedHandoffId = id;
  state.selectedRightHandoffId = id;
  activateRight('handoff', 'handoff');
  toast('Handoff sent', `${member(s.ownerId).name} → ${member(toOwnerId).name}`);
  render();
}

function discardDraftHandoff() {
  state.draftHandoff = null;
  const s = currentSession();
  if (s.artifactIds.length) activateRight('artifact', 'artifact');
  else if (s.usedItems.length) activateRight('context', 'context');

  toast('Handoff draft 已丢弃');

}

function addArtifactToHandoff(id) {

function askAiToRevise(type, id) {
  const s = currentSession();
  const ref = resolveRefById(id);
  const prompt = type === 'artifact'
    ? `请基于当前对话修改右栏 artifact「${ref.title}」，重点保持 P0 范围清晰、可交接。`
    : type === 'handoff'
      ? `请基于当前对话优化右栏 handoff package「${ref.title}」，让下游 owner 不需要重新问背景。`
      : `请基于当前对话优化右栏 context「${ref.title}」，保持可追溯、可复用。`;
  s.messages.push({ id: `m_${Date.now()}_revise`, role: 'user', authorId: s.ownerId, body: prompt });
  s.messages.push({ id: `m_${Date.now()}_revise_ai`, role: 'ai', agentId: s.agentId, body: '已收到，我会把右栏当前内容作为修改对象。你可以继续补充修改要求，或直接在右栏编辑后保存。', sourceRefs: [id] });
  s.updatedAt = '刚刚';
  toast('已把右栏内容作为 AI 修改对象', ref.title);
  render();
}

function startSessionFromHandoff(id) {
  const h = handoff(id);
  if (!h) return;
  h.status = 'used';
  const existing = Object.values(data.sessions).find(s => s.usedItems.some(ref => ref.type === 'handoff' && ref.id === id) && s.ownerId === h.toOwnerId);
  if (existing) {
    state.currentSessionId = existing.id;
  } else {
    const to = member(h.toOwnerId);
    const agentId = h.toOwnerId === 'pm' ? 'product' : h.toOwnerId === 'engineer' ? 'engineering' : h.toOwnerId === 'ceo' ? 'strategy' : 'research';
    const newId = `sess_${Date.now()}`;
    data.sessions[newId] = {
      id: newId,
      title: `${to.shortRole} Session from Handoff：${h.title}`,
      ownerId: h.toOwnerId,
      agentId,
      model: 'OpenAI GPT-5.5',
      projectId: h.projectId,
      status: 'active',
      updatedAt: '刚刚',
      usedItems: [{ type: 'handoff', id: h.id, usedAt: '刚刚' }, ...h.relatedContextIds.map(cid => ({ type: 'context', id: cid, usedAt: '刚刚' })), ...h.relatedArtifactIds.map(aid => ({ type: 'artifact', id: aid, usedAt: '刚刚' }))],
      artifactIds: [],
      handoffIds: [],
      messages: [{ id: `m_${Date.now()}`, role: 'ai', agentId, body: `已基于 handoff package 创建新 session。我会优先读取该 package、related context 和 related artifacts，而不是让你阅读完整上游原始对话。`, sourceRefs: [h.id, ...h.relatedContextIds.slice(0, 2)] }]
    };
    state.currentSessionId = newId;
  }
  state.currentRole = h.toOwnerId;
  state.view = 'workbench';
  state.selectedRightContextId = h.id;
  activateRight('context', 'context');
  toast('已从 Handoff 开启新 Session', h.title);
  render();

function toast(message, detail = '') {
  const root = document.getElementById('toast-root');
  const node = document.createElement('div');
  node.className = 'toast';
  node.innerHTML = `${escapeHtml(message)}${detail ? `<small>${escapeHtml(detail)}</small>` : ''}`;
  root.appendChild(node);
  setTimeout(() => {
    node.style.opacity = '0';
    node.style.transform = 'translateY(8px)';
    setTimeout(() => node.remove(), 220);
  }, 2600);
}



/* ===== Override: handoff as lightweight operation + context lives in chat, not right-list ===== */
function truncateText(value, max = 220) {
  const text = String(value || '').replace(/\s+/g, ' ').trim();
  return text.length > max ? text.slice(0, max - 1) + '…' : text;
}

function visibleContextRefs() {
  const s = currentSession();
  return s.usedItems.filter(ref => ['context', 'github', 'handoff', 'artifact'].includes(ref.type));
}

function renderContextTextLink(ref, extraClass = '') {
  const item = resolveTypedRef(ref);
  return `<button class="context-text-link ${extraClass}" onclick="openTypedRef('${ref.type}', '${ref.id}')" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</button>`;
}

function renderComposerContextBar() {
  const refs = visibleContextRefs();
  if (!refs.length) return '';
  return `
    <div class="composer-context-bar">
      <span class="composer-context-label">Context</span>
      <div class="composer-context-links">
        ${refs.map(ref => renderContextTextLink(ref, ref.type !== 'context' ? 'muted' : '')).join('')}
      </div>
    </div>
  `;
}

function renderCenterPanel(compact = false) {
  const s = currentSession();
  const owner = member(s.ownerId);
  return `
    <section class="panel center-panel ${compact ? 'compact' : ''}">
      <div class="center-header ${compact ? 'compact' : ''}">
        <div class="session-title-row">
          <div class="session-heading">

            <div>
              <div class="session-name">${escapeHtml(s.title)}</div>
              <div class="session-meta">${project(s.projectId).name} · ${owner.name} · ${s.updatedAt}</div>

        </div>
      </div>

        ${s.messages.map(renderMessage).join('')}
      </div>

        ${renderComposerContextBar()}

        <div class="composer-actions">

              <span>Agent</span>
              <select onchange="updateSessionField('agentId', this.value)">

              <span>Model</span>
              <select onchange="updateSessionField('model', this.value)">

function renderMessage(msg) {
  const isAi = msg.role === 'ai';
  const owner = isAi ? null : member(msg.authorId);
  const ag = isAi ? agent(msg.agentId) : null;
  const sourceRefs = (msg.sourceRefs || []).map(id => inferTypedRef(id)).filter(Boolean);
  return `
    <div class="message ${isAi ? 'ai' : 'user'}">
      <div class="avatar ${isAi ? 'pm' : owner.avatarClass}" aria-hidden="true">${isAi ? 'AI' : owner.avatar}</div>
      <div class="message-bubble ${isAi ? 'ai' : 'user'}" aria-label="${isAi ? ag.name : owner.name}">
        ${isAi ? `<div class="message-author">${ag.name}</div>` : ''}
        <div class="message-body">${richText(msg.body)}</div>
        ${isAi && sourceRefs.length ? `<div class="source-link-list"><span class="source-link-list__label">Context</span>${sourceRefs.map(ref => renderContextTextLink(ref, ref.type !== 'context' ? 'muted' : '')).join('')}</div>` : ''}
        ${isAi ? renderAiMessageActions(msg) : ''}
      </div>
    </div>
  `;
}

function inferTypedRef(id) {
  if (data.contextItems[id]) return { type: 'context', id };
  if (data.githubFiles[id]) return { type: 'github', id };
  if (data.artifacts[id]) return { type: 'artifact', id };
  if (data.handoffs[id]) return { type: 'handoff', id };
  return null;
}

function hasRightPanelContent() {
  if (!state.rightPanelVisible) return false;
  const mode = getRightMode();
  const s = currentSession();
  if (mode === 'artifact') return s.artifactIds.length > 0 || !!state.selectedRightArtifactId;
  if (mode === 'handoff') return !!state.draftHandoff || s.handoffIds.length > 0 || !!state.selectedRightHandoffId;
  if (mode === 'context') return !!state.selectedRightContextId;
  return false;
}

function renderContextPanel() {
  const id = state.selectedRightContextId;
  if (!id) return `<div class="empty-state right-empty">点击 AI 回复下方的 context 链接后，在这里查看详情。</div>`;
  const ref = inferTypedRef(id) || { type: 'context', id };
  if (ref.type === 'context') return renderContextDetailDocument(id);
  if (ref.type === 'github') return renderGithubDetailDocument(id);
  if (ref.type === 'artifact') return renderArtifactEditorPanel();
  if (ref.type === 'handoff') return renderHandoffPanel();
  return `<div class="empty-state right-empty">未找到对应 context。</div>`;
}

function renderContextDetailDocument(id) {
  const item = contextItem(id);
  const sourceSession = item.source?.sessionId ? session(item.source.sessionId) : null;
  const sourceArtifact = item.source?.artifactId ? artifact(item.source.artifactId) : null;
  const sourceOwner = item.source?.ownerId ? member(item.source.ownerId) : null;
  const s = ensureCurrentSession();
  const isAttached = s.usedItems.some(ref => ref.type === 'context' && ref.id === item.id);
  return `
    <div class="context-detail-doc">
      <header class="context-detail-doc__header">
        <div class="context-detail-doc__title">${escapeHtml(item.title)}</div>
        <button class="artifact-action muted context-close-btn" onclick="closeRightPanel()" title="Close" aria-label="Close">✕</button>
      </header>
      <main class="context-detail-doc__body">
        <div class="context-detail-doc__summary">${escapeHtml(item.summary)}</div>
        <div class="markdownish">${richText(item.content)}</div>
        <div class="context-detail-doc__meta">
          <div>Source owner：${sourceOwner ? `${sourceOwner.name} · ${sourceOwner.shortRole}` : 'Company Context'}</div>
          <div>Source session：${sourceSession ? escapeHtml(sourceSession.title) : 'unknown'}</div>
          <div>Source artifact：${sourceArtifact ? escapeHtml(sourceArtifact.title) : 'none'}</div>
          <div>Version：v${item.version} · ${item.updatedAt}</div>
        </div>
      </main>
      <div class="right-floating-attach">
        <button class="right-floating-attach__button ${isAttached ? 'is-attached' : ''}" onclick="attachContext('${item.id}')">
          Attach to Session
        </button>
      </div>
    </div>
  `;
}

function renderGithubDetailDocument(id) {
  const f = githubFile(id);
  const s = ensureCurrentSession();
  const isAttached = s.usedItems.some(ref => ref.type === 'github' && ref.id === f.id);
  return `
    <div class="context-detail-doc">
      <header class="context-detail-doc__header">
        <div class="context-detail-doc__title">⌘ ${escapeHtml(f.path)}</div>
        <button class="artifact-action muted context-close-btn" onclick="closeRightPanel()" title="Close" aria-label="Close">✕</button>

      <main class="context-detail-doc__body">
        <div class="context-detail-doc__summary">${escapeHtml(f.summary)}</div>

function openTypedRef(type, id) {
  if (type === 'context') showContextDetail(id);
  else if (type === 'github') { state.selectedRightContextId = id; activateRight('context', 'context-detail'); render(); }
  else if (type === 'artifact') showArtifact(id);
  else if (type === 'handoff') openHandoffDetail(id);
}

function showContextDetail(id) {
  if (!currentSession().usedItems.some(ref => ref.type === 'context' && ref.id === id)) {
    addUsedRef({ type: 'context', id, usedAt: '查看中' });

  state.selectedRightContextId = id;
  activateRight('context', 'context-detail');

}

}

function sendMessage() {
  const input = document.getElementById('composer-input');
  const text = input.value.trim();
  if (!text) { toast('请输入一条消息'); return; }
  const s = currentSession();
  s.messages.push({ id: `m_${Date.now()}_u`, role: 'user', authorId: s.ownerId, body: text });
  const response = simulateAiResponse(s, text);
  s.messages.push({ id: `m_${Date.now()}_ai`, role: 'ai', agentId: s.agentId, body: response.body, sourceRefs: response.sourceRefs });
  s.updatedAt = '刚刚';
  state.rightPanelVisible = false;
  state.rightMode = null;
  state.rightReason = null;
  state.selectedRightContextId = null;
  render();
}

function retryAiMessage(messageId) {
  const s = currentSession();
  const idx = s.messages.findIndex(m => m.id === messageId);
  if (idx < 0) return;
  const priorUser = [...s.messages.slice(0, idx)].reverse().find(m => m.role === 'user');
  const prompt = priorUser?.body || '请基于当前上下文重新组织答案。';
  const response = simulateAiResponse(s, prompt);
  s.messages[idx] = { ...s.messages[idx], body: `${response.body}\n\n（已根据当前 attached context 重新生成。）`, sourceRefs: response.sourceRefs };
  s.updatedAt = '刚刚';
  toast('已重试这条 AI 回复');
  render();
}

  if (d.targetType === 'message') {

  return '';
}

    targetType: 'message',
    targetId: msg?.id || null,
    title,
    toOwnerId: defaultTo,

    relatedArtifactIds: d.relatedArtifactIds || [],

    currentStatus: d.currentStatus,
    keyDecisions: [], constraints: [], openQuestions: [], risks: [], suggestedNextSteps: [],

function summarizeSessionTitle(text, agentId) {
  const cleaned = String(text || '').replace(/\s+/g, ' ').trim();

  const prefix = agent(agentId)?.role === 'engineering' ? 'Engineering Session'
    : agent(agentId)?.role === 'strategy' ? 'Strategy Session'
    : agent(agentId)?.role === 'research' ? 'Research Session'
    : 'Product Session';
  const short = cleaned.length > 26 ? `${cleaned.slice(0, 26)}…` : cleaned;
  return `${prefix}：${short}`;
}

  s.messages.push({ id: `m_${Date.now()}_u`, role: 'user', authorId: s.ownerId, body: text });
  const response = simulateAiResponse(s, text);
  s.messages.push({ id: `m_${Date.now()}_ai`, role: 'ai', agentId: s.agentId, body: response.body, sourceRefs: response.sourceRefs });
  s.updatedAt = '刚刚';

function sendMessage() {
  const input = document.getElementById('composer-input');
  const text = input.value.trim();
  if (!text) { toast('请输入一条消息'); return; }
  const s = currentSession();
  if (s.isUntitled || s.title === 'New session') {
    s.title = summarizeSessionTitle(text, s.agentId);
    s.isUntitled = false;
  }
  s.messages.push({ id: `m_${Date.now()}_u`, role: 'user', authorId: s.ownerId, body: text });
  const response = simulateAiResponse(s, text);
  s.messages.push({ id: `m_${Date.now()}_ai`, role: 'ai', agentId: s.agentId, body: response.body, sourceRefs: response.sourceRefs });
  s.updatedAt = '刚刚';
  input.value = '';
  state.rightPanelVisible = false;
  state.rightMode = null;
  state.rightReason = null;
  state.selectedRightContextId = null;
  state.contextFocusMode = false;
  render();
}

function renameSession(id) {
  const s = session(id);
  if (!s) return;
  const next = prompt('Rename session', s.title);
  if (!next || !next.trim()) return;
  s.title = next.trim();
  s.isUntitled = false;
  s.updatedAt = '刚刚';
  toast('Session renamed', s.title);
  render();
}

function deleteSession(id) {
  const s = session(id);
  if (!s) return;
  if (!confirm(`Delete session “${s.title}”?`)) return;
  delete data.sessions[id];
  const remaining = Object.values(data.sessions).sort((a, b) => String(b.updatedAt || '').localeCompare(String(a.updatedAt || '')));
  if (state.currentSessionId === id) {
    state.currentSessionId = remaining[0]?.id || null;
    if (!state.currentSessionId) ensureCurrentSession();
  }
  state.rightPanelVisible = false;
  state.rightMode = null;
  state.selectedRightContextId = null;
  state.contextFocusMode = false;
  toast('Session deleted');
  render();
}

      <div class="right-floating-attach" aria-live="polite">
        <button class="right-floating-attach__button ${isAttached ? 'is-attached' : ''}" onclick="attachGithubFile('${f.id}')">
          Attach to Session
        </button>
      </div>
    </div>
  `;
}

const attachToSessionFinalStyle = document.createElement('style');
attachToSessionFinalStyle.textContent = `
  .context-detail-doc.with-floating-attach .right-floating-attach__button {
    min-width: 178px !important;
  }
  .composer-context-bar {
    scroll-margin-top: 80px;
  }
`;
document.head.appendChild(attachToSessionFinalStyle);

render();

  </script>
</body>
</html>
