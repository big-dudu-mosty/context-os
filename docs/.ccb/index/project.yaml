## 当前技术栈
tech_stack:
  - Backend: TypeScript + Express
  - Database: PostgreSQL 15 + pgvector
  - Migrations: node-pg-migrate
  - LLM client: OpenAI-compatible Chat Completions API
  - Scheduler: node-cron
  - Runtime: Docker Compose + Node.js
confidence: high
source: backend/package.json + docker-compose.yml

## 当前已实现后端链路
implemented_backend_flow:
  - User / Agent / Project / Session 基础模型
  - Session transcript_path 触发 Dream
  - Dream 生成 ContextPackage YAML
  - ExtractionService 提取 Decisions / Tasks / Risks / Open Questions / Observations
  - BriefingService 生成简报
  - HandoffService 创建和处理交接记录
confidence: high
source: backend/src/services/*

## 新版目标主链路
target_product_flow:
  - 用户进入 AI Context Workbench
  - 左侧选择或新建 Session
  - 中间选择 Agent 和 Model 进行 AI 对话
  - AI 生成 Artifact 草稿
  - 用户查看、编辑、确认保存
  - 保存为 Company / Project Context
  - 后端结构化提取
  - 生成 Decisions / Tasks / Risks / Questions / Observations
  - 后续用于 Briefing、Handoff、任务说明和邮件草稿
confidence: high
source: docs/project-logic-and-architecture.md

## 核心产品边界
product_boundaries:
  - 聊天记录是过程数据，不自动进入资料库
  - Artifact 是 AI 生成的草稿，不等于正式资料
  - 用户确认保存后的 Context 才是正式归档资料
  - 任务和邮件当前只生成内容草稿，不直接发送
  - Dream Review 生成建议，不应自动污染 Company / Project Context
confidence: high
source: docs/project-logic-and-architecture.md

